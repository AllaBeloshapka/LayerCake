<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Pastry Chef: Reviews</title>

    <link
      rel="stylesheet"
      href="reviews-style.css"
      type="text/css"
    />

    <script src="./reviews-data.js"></script>

    <script src="index.js" defer></script>
  </head>

  <body>
    <div id="root">
      <!-- Header -->
      <header class="header"></header>

      <!-- Navigation -->
      <nav>
        <h5 class="nav-text">
          <a href="../galery/index-galery.html">
            Cake Gallery & Prices
          </a>
        </h5>

        <h5 class="nav-text">
          <a href="../index.html">
            About me
          </a>
        </h5>
      </nav>

      <!-- Main content -->
      <main class="main">
        <!-- Review form -->
        <div class="user_form">
          <div class="input">
            <!-- Review text area -->
            <textarea
              class="user_input_form"
              placeholder="Please leave your feedback."
            ></textarea>

            <!-- Upload review photo -->
            <div class="foto">
              <label
                class="from-label"
                for="user_foto"
              >
                Select a review photo
              </label>

              <input
                type="file"
                id="foto_input"
                accept="image/*"
              />
            </div>
          </div>

          <!-- Submit review button -->
          <button
            type="button"
            class="send_btn"
          >
            Leave a Review
          </button>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer-container">
        <div id="foto-name"></div>

        <div class="contact">
          <h6>Pick up your order at:</h6>
          <h6>38-39 Bell Blvd,</h6>
          <h6>Bayside, NY 11361</h6>
        </div>

        <div class="contact">
          <h6>info@gmail.com</h6>
          <h6>Tel. +0 000 00 00 000</h6>
        </div>
      </footer>
    </div>
  </body>
</html>

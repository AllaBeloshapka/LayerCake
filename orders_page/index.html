<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="styles.css" type="text/css" />
    <script type="module" src="index.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders page</title>
  </head>

  <body id="root">
    <main>
      <div class="orders-topbar">
        <button type="button" class="back-btn">← Back to admin</button>

        <section class="orders-filters">
          <div class="orders-search">
            <input
              type="text"
              id="ordersSearchInput"
              class="orders-filter-input"
              placeholder="Search by cake, customer or phone"
            />

            <button
              type="button"
              id="ordersSearchBtn"
              class="orders-search-btn"
              aria-label="Search orders"
            >
              🔍
            </button>
          </div>

          <select id="filterByStatus" class="orders-filter-select">
            <option value="all">All statuses</option>
            <option value="New order">New order</option>
            <option value="In progress">In progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </section>
      </div>

      <div class="orders-container"></div>
    </main>

    <div class="status-modal-overlay" id="completed-status-modal" hidden>
      <div class="status-modal-box">
        <h2 class="status-modal-title">Complete this order?</h2>
        <p class="status-modal-text">
          The order will be marked as completed and the customer will receive an
          email with a review link.
        </p>
        <div class="status-modal-actions">
          <button
            type="button"
            class="status-modal-btn status-modal-btn-primary"
            id="completed-status-send"
          >
            Send email
          </button>
          <button
            type="button"
            class="status-modal-btn status-modal-btn-secondary"
            id="completed-status-back"
          >
            Back to previous status
          </button>
        </div>
      </div>
    </div>
  </body>
</html>

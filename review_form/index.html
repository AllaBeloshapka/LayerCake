<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pastry Chef: Leave a Review</title>

    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="review-form.css" type="text/css" />

    <script type="module" src="index.js" defer></script>
  </head>

  <body>
    <div id="root">
      <!-- Header -->
      <header class="header"></header>

      <!-- Navigation -->
      <nav>
        <h5 class="nav-text">
          <a href="../galery/index-galery.html"> Cake Gallery & Prices </a>
        </h5>
      </nav>

      <!-- Main content -->
      <main class="main">
        <h1>Leave a Review</h1>

        <p class="order-info">Your order information will appear here.</p>

        <form class="review-form">
          <label for="rating">Rating</label>

          <select id="rating" name="rating">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>

          <label for="review-text">Review text</label>

          <textarea
            id="review-text"
            name="text"
            required
            placeholder="Please tell us what you liked about your cake."
          ></textarea>

          <label for="review-photo">Photo</label>

          <input
            type="file"
            id="review-photo"
            name="image"
            accept="image/*"
          />

          <p class="photo-hint">
            Photo is optional. If you do not upload one, we will use the cake
            photo from your order.
          </p>

          <button type="submit" class="send-review-btn">Send Review</button>

          <p class="review-message"></p>
        </form>
      </main>

      <!-- Footer -->
      <footer class="footer-container">
        <div id="foto-name"></div>

        <div class="contact">
          <p>Pick up your order at:</p>
          <p>38-39 Bell Blvd,</p>
          <p>Bayside, NY 11361</p>
        </div>

        <div class="contact">
          <p>info@gmail.com</p>
          <p>Tel. +0 000 00 00 000</p>
        </div>
      </footer>
    </div>
  </body>
</html>
